<!DOCTYPE html>
<html>
<head>
<title>EVM Voting</title>

<style>

body{
font-family:Arial;
background:#eef3fb;
margin:0;
}

header{
background:#003b8e;
color:white;
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:30px auto;
background:white;
padding:30px;
border-radius:20px;
}

.party{
display:flex;
align-items:center;
justify-content:space-between;
padding:20px;
border-bottom:1px solid #ddd;
}

.left{
display:flex;
align-items:center;
gap:20px;
}

.left img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
}

.name{
font-size:24px;
font-weight:bold;
}

button{
width:100%;
padding:20px;
font-size:25px;
background:#1664d9;
color:white;
border:none;
border-radius:12px;
margin-top:20px;
cursor:pointer;
}

button:hover{
background:#0c54bf;
}

</style>
</head>

<body>

<header>
🗳 ONLINE EVM
</header>

<div class="container">

<label class="party">

<div class="left">

<input type="radio" name="vote" value="TVK">

<img src="https://upload.wikimedia.org/wikipedia/en/0/0b/Tamilaga_Vetri_Kazhagam_flag.png">

<div class="name">
TVK
</div>

</div>

</label>

<label class="party">

<div class="left">

<input type="radio" name="vote" value="DMK">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/DMK_Flag.svg">

<div class="name">
DMK
</div>

</div>

</label>

<label class="party">

<div class="left">

<input type="radio" name="vote" value="AIADMK">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/88/AIADMK_flag.png">

<div class="name">
AIADMK
</div>

</div>

</label>

<label class="party">

<div class="left">

<input type="radio" name="vote" value="NTK">

<img src="https://upload.wikimedia.org/wikipedia/en/4/43/Naam_Tamizhar_Katchi.png">

<div class="name">
NTK
</div>

</div>

</label>

<label class="party">

<div class="left">

<input type="radio" name="vote" value="BJP">

<img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Bharatiya_Janata_Party_logo.svg">

<div class="name">
BJP
</div>

</div>

</label>

<button onclick="voteNow()">
🔒 CAST VOTE
</button>

</div>

<script>

if(localStorage.getItem("voted") ===
localStorage.getItem("loggedInUser")){

document.body.innerHTML =
"<h1 style='text-align:center;margin-top:100px;'>❌ You already voted</h1>";

}

function voteNow(){

let selected =
document.querySelector('input[name="vote"]:checked');

if(!selected){

alert("Select a party");
return;

}

let party = selected.value;

let votes =
JSON.parse(localStorage.getItem("votes")) || {

TVK:0,
DMK:0,
AIADMK:0,
NTK:0,
BJP:0

};

votes[party]++;

localStorage.setItem("votes",
JSON.stringify(votes));

localStorage.setItem("voted",
localStorage.getItem("loggedInUser"));

alert("✅ Vote Submitted");

location.reload();

}

</script>

</body>
</html>
